<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TTS Studio Pro</title>

<style>
  body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background: #0b0f19;
    color: #e5e7eb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .app {
    width: 760px;
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }

  .title {
    font-size: 18px;
    font-weight: 600;
  }

  .badge {
    font-size: 12px;
    padding: 4px 10px;
    background: #1d4ed8;
    border-radius: 999px;
    color: white;
  }

  select, textarea {
    width: 100%;
    border-radius: 10px;
    border: 1px solid #374151;
    background: #0f172a;
    color: white;
    padding: 12px;
    outline: none;
  }

  textarea {
    height: 220px;
    margin-top: 12px;
    resize: none;
  }

  .row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 500;
  }

  .primary {
    background: #4f46e5;
    color: white;
  }

  .secondary {
    background: #1f2937;
    color: #e5e7eb;
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .status {
    margin-top: 12px;
    font-size: 13px;
    color: #9ca3af;
    min-height: 18px;
  }

  .label {
    font-size: 12px;
    margin-top: 14px;
    margin-bottom: 6px;
    color: #9ca3af;
  }
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <div class="title">TTS Studio Pro</div>
    <div class="badge">Docker Engine</div>
  </div>

  <div class="label">Voice</div>
  <select id="voice">
    <option value="en-US-GuyNeural">Male (US) - Guy</option>
    <option value="en-US-JennyNeural">Female (US) - Jenny</option>
    <option value="en-GB-RyanNeural">Male (UK) - Ryan</option>
    <option value="en-GB-SoniaNeural">Female (UK) - Sonia</option>
  </select>

  <div class="row">
    <button class="secondary" onclick="previewVoice()">Preview Voice</button>
  </div>

  <div class="label">Script</div>
  <textarea id="text" placeholder="Write your YouTube script..."></textarea>

  <div class="row">
    <button class="primary" id="generateBtn" onclick="generate()">Generate Audio</button>
  </div>

  <div class="status" id="status"></div>

</div>

<script>
const status = document.getElementById("status");
const btn = document.getElementById("generateBtn");

function setStatus(msg) {
  status.innerText = msg;
}

/* ---------------- PREVIEW VOICE ---------------- */
async function previewVoice() {
  const voice = document.getElementById("voice").value;

  setStatus("Generating preview...");

  const res = await fetch("http://localhost:3000/tts-preview", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      voice,
      text: "This is a voice preview for your selected narrator."
    })
  });

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);

  const audio = new Audio(url);
  audio.play();

  setStatus("Preview playing.");
}

/* ---------------- FULL GENERATION ---------------- */
async function generate() {
  const text = document.getElementById("text").value;
  const voice = document.getElementById("voice").value;

  if (!text.trim()) return;

  btn.disabled = true;
  setStatus("Generating audio...");

  try {
    const res = await fetch("http://localhost:3000/tts", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, voice })
    });

    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "voice.zip";
    a.click();

    setStatus("Done. Download started.");
  } catch (e) {
    setStatus("Error generating audio.");
  }

  btn.disabled = false;
}
</script>

</body>
</html>
